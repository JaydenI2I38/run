# 缓冲区判定工具 GUI 配置
#
# 路径解析规则：
#   - 相对路径（如 ./shp_input）以本 yaml 文件所在目录为基准。
#   - 推荐部署方式：把 exe、本 yaml、shp_input/、output/ 放在同一目录，
#     这样移动整个目录到任意机器都能直接用。
#   - 也可以填绝对路径（如 D:\\GIS\\shp_input、/Users/foo/data/shp_input）。

shp:
  # 存放各省 .shp 文件的根目录；脚本会递归扫描并按文件名中的 6 位行政编码匹配。
  root_dir: "./shp_input"
  # 文件名中识别行政编码用的正则（默认抓 6 位连续数字）。
  filename_code_regex: "(\\d{6})"

output:
  # 结果 Excel 输出目录；不存在会自动创建。
  dir: "./output"
  # 在输出 Excel 中新增的标记列名。
  flag_column: "是否在缓冲区内"
  # 输出文件命名模板，可用占位符：{excel_stem} {province_code} {province_name}
  filename_template: "{excel_stem}_{province_code}_{province_name}_flagged.xlsx"

region:
  # GUI 下拉框中的省份列表（code 必须与 shp 文件名中的行政编码一致）。
  provinces:
    - code: "110000"
      name: "北京市"
    - code: "120000"
      name: "天津市"
    - code: "130000"
      name: "河北省"
    - code: "140000"
      name: "山西省"
    - code: "210000"
      name: "辽宁省"
    - code: "420000"
      name: "湖北省"
